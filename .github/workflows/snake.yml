name: Generate Snake

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  generate:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout snk
        uses: actions/checkout@v7
        with:
          repository: Platane/snk
          ref: v3.5.0
          path: snk

      - name: Set up bun
        uses: oven-sh/setup-bun@v2

      # L'API GraphQL repond RESOURCE_LIMITS_EXCEEDED pour ce compte depuis le
      # 2026-07-17. snk sait lire la page publique, sans token, mais ne branche
      # pas ce lecteur : on le substitue au point d'entree du package.
      - name: Read contributions from the public page
        run: |
          cat > snk/packages/github-user-contribution/index.ts <<'EOF'
          export { fetchGithubUserContributionHtml as getGithubUserContribution } from "./fetchContributionHtml";
          import type { fetchGithubUserContributionHtml } from "./fetchContributionHtml";
          export type Res = Awaited<ReturnType<typeof fetchGithubUserContributionHtml>>;
          export type Cell = Res[number];
          EOF

      - name: Generate snake
        working-directory: snk
        env:
          GITHUB_TOKEN: unused-by-the-html-source # exige par le CLI
          OWNER: ${{ github.repository_owner }}
        run: |
          bun install --frozen-lockfile
          bun run packages/generate-snake-animation/cli.ts \
            --github_user="$OWNER" \
            --output=../dist/github-snake.svg \
            --output='../dist/github-snake-dark.svg?palette=github-dark'

      - name: Push to output branch
        uses: crazy-max/ghaction-github-pages@v5
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
