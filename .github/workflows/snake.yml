name: Generate Snake

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  generate:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout snk
        uses: actions/checkout@v7
        with:
          repository: Platane/snk
          ref: v3.5.0
          path: snk

      - name: Set up bun
        uses: oven-sh/setup-bun@v2

      # GitHub a durci les limites de son API GraphQL le 2026-07-17 :
      # contributionCalendar repond RESOURCE_LIMITS_EXCEEDED pour ce compte,
      # dont 92% des contributions sont privees. On lit la page publique des
      # contributions a la place. snk embarque deja ce lecteur mais ne le
      # branche pas, donc on le substitue au point d'entree du package.
      - name: Read contributions from the public page
        run: |
          cat > snk/packages/github-user-contribution/index.ts <<'EOF'
          export { fetchGithubUserContributionHtml as getGithubUserContribution } from "./fetchContributionHtml";
          import type { fetchGithubUserContributionHtml } from "./fetchContributionHtml";
          export type Res = Awaited<ReturnType<typeof fetchGithubUserContributionHtml>>;
          export type Cell = Res[number];
          EOF

      - name: Generate snake
        working-directory: snk
        env:
          # Le CLI exige la variable, le lecteur HTML ne s'en sert pas.
          # On ne donne donc pas de vrai token a ce code tiers.
          GITHUB_TOKEN: unused-by-the-html-source
          OWNER: ${{ github.repository_owner }}
        run: |
          bun install --frozen-lockfile
          bun run packages/generate-snake-animation/cli.ts \
            --github_user="$OWNER" \
            --output=../dist/github-snake.svg \
            --output='../dist/github-snake-dark.svg?palette=github-dark'

      - name: Push to output branch
        uses: crazy-max/ghaction-github-pages@v5
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
